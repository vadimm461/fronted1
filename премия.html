});

# редактор-премии.html

```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Редактор премии — AUTO-STYLE</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 20px;
}

h1 {
    text-align: center;
}

.form {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: #4caf50;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.delete {
    background: red;
    width: auto;
    padding: 8px 15px;
}
</style>
</head>
<body>

<h1>Админ панель</h1>

<div class="form">
    <input type="text" id="name" placeholder="Название товара">
    <input type="number" id="plan" placeholder="План продаж">
    <input type="number" id="sold" placeholder="Продано">
    <input type="number" id="bonus" placeholder="Бонус за 1 продажу (₽)">

    <button onclick="addProduct()">Добавить товар</button>
</div>

<div id="list"></div>

<script>
let products = JSON.parse(localStorage.getItem('products')) || [];

function saveProducts() {
    localStorage.setItem('products', JSON.stringify(products));
    renderProducts();
}

function addProduct() {
    const name = document.getElementById('name').value;
    const plan = document.getElementById('plan').value;
    const sold = document.getElementById('sold').value;
    const bonus = document.getElementById('bonus').value;

    if (!name || !plan || !sold || !bonus) {
        alert('Заполните все поля');
        return;
    }

    products.push({
        name,
        plan: Number(plan),
        sold: Number(sold),
        bonus: Number(bonus)
    });

    saveProducts();

    document.getElementById('name').value = '';
    document.getElementById('plan').value = '';
    document.getElementById('sold').value = '';
    document.getElementById('bonus').value = '';
}

function deleteProduct(index) {
    products.splice(index, 1);
    saveProducts();
}

function renderProducts() {
    const list = document.getElementById('list');

    list.innerHTML = '';

    products.forEach((product, index) => {
        list.innerHTML += `
            <div class="card">
                <div>
                    <strong>${product.name}</strong><br>
                    Продано: ${product.sold}/${product.plan}<br>
                    Бонус: ${product.bonus} ₽
                </div>

                <button class="delete" onclick="deleteProduct(${index})">
                    Удалить
                </button>
            </div>
        `;
    });
}

renderProducts();
</script>

</body>
</html>
