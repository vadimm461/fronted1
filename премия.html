<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Премия — AUTO-STYLE</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Inter,sans-serif;
background:#f4f7fb;
overflow:hidden;
}

/* HEADER */

.header{
height:82px;
background:rgba(255,255,255,.88);
backdrop-filter:blur(14px);
border-bottom:1px solid #e5e7eb;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
}

.left{
display:flex;
align-items:center;
gap:16px;
}

.logo{
display:flex;
align-items:center;
gap:12px;
text-decoration:none;
color:#111827;
}

.logo img{
width:44px;
height:44px;
border-radius:10px;
}

.logo-title{
font-size:28px;
font-weight:900;
}

.green{
color:#2e7d32;
}

.subtitle{
font-size:11px;
letter-spacing:2px;
color:#94a3b8;
}

.back{
border:none;
background:linear-gradient(135deg,#34c759,#1f8f3d);
color:white;
padding:12px 20px;
border-radius:16px;
cursor:pointer;
font-weight:800;
transition:.2s;
}

.back:hover{
transform:translateY(-1px);
}

/* CONTENT */

.content{
height:calc(100vh - 82px);
overflow:auto;
padding:20px;
}

/* TOP BONUS */

.total{
position:sticky;
top:0;
z-index:100;

background:linear-gradient(
135deg,
#1f2937,
#111827
);

color:white;

padding:22px;

border-radius:24px;

display:flex;
align-items:center;
justify-content:space-between;

margin-bottom:20px;

box-shadow:
0 10px 30px rgba(0,0,0,.12);
}

.total-title{
font-size:18px;
opacity:.8;
}

.total-value{
font-size:34px;
font-weight:900;
}

/* GRID */

.products-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:18px;
}

/* CARD */

.card{
background:white;
border-radius:24px;
padding:20px;
box-shadow:
0 10px 25px rgba(0,0,0,.06);

transition:.2s;
border:1px solid #edf1f5;
}

.card:hover{
transform:translateY(-3px);
}

.card h2{
font-size:20px;
margin-bottom:12px;
color:#111827;
}

.stats{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:14px;
color:#64748b;
}

/* MODERN PROGRESS */

.progress{
height:18px;
background:#e5e7eb;
border-radius:999px;
overflow:hidden;
position:relative;
}

.progress-bar{
height:100%;
border-radius:999px;

background:
linear-gradient(
90deg,
#22c55e,
#16a34a,
#15803d
);

display:flex;
align-items:center;
justify-content:flex-end;

padding-right:8px;

font-size:11px;
font-weight:700;
color:white;

box-shadow:
0 0 18px rgba(34,197,94,.45);

transition:.4s;
}

/* BONUS */

.money{
margin-top:18px;
padding:14px;
border-radius:18px;

background:
linear-gradient(
135deg,
#dcfce7,
#bbf7d0
);

color:#166534;

font-size:24px;
font-weight:900;

text-align:center;
}

/* MOBILE */

@media(max-width:1600px){

.products-grid{
grid-template-columns:repeat(4,1fr);
}

}

@media(max-width:1200px){

.products-grid{
grid-template-columns:repeat(3,1fr);
}

}

@media(max-width:900px){

.products-grid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:600px){

.products-grid{
grid-template-columns:1fr;
}

.header{
padding:12px;
height:auto;
flex-wrap:wrap;
gap:12px;
}

.content{
height:calc(100vh - 110px);
}

.logo-title{
font-size:22px;
}

.total{
flex-direction:column;
align-items:flex-start;
gap:8px;
}

.total-value{
font-size:28px;
}

}

</style>
</head>

<body>

<header class="header">

<div class="left">

<a href="index.html" class="logo">

<img src="favicon.png">

<div>

<div class="logo-title">
<span class="green">A</span>uto-
<span class="green">S</span>tyle
</div>

<div class="subtitle">
ПАНЕЛЬ МЕНЕДЖЕРА
</div>

</div>

</a>

</div>

<button class="back" onclick="history.back()">
← Назад
</button>

</header>

<div class="content">

<div class="total">

<div>
<div class="total-title">
Общая премия
</div>
<div class="total-value" id="totalBonus">
0 ₽
</div>
</div>

</div>

<div class="products-grid" id="products"></div>

</div>

<script>

const products =
JSON.parse(localStorage.getItem('products')) || [];

const container =
document.getElementById('products');

const totalBonus =
document.getElementById('totalBonus');

let total = 0;

products.forEach(product => {

const percent =
Math.min(
(product.sold / product.plan) * 100,
100
);

const bonus =
product.sold * product.bonus;

total += bonus;

container.innerHTML += `

<div class="card">

<h2>${product.name}</h2>

<div class="stats">
<span>
Продано:
<b>${product.sold}</b>
</span>

<span>
План:
<b>${product.plan}</b>
</span>
</div>

<div class="progress">

<div
class="progress-bar"
style="width:${percent}%">

${Math.round(percent)}%

</div>

</div>

<div class="money">
${bonus} ₽
</div>

</div>

`;

});

totalBonus.innerText =
`${total} ₽`;

</script>

</body>
</html>
