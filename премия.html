<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Премия — AUTO-STYLE</title>

<style>

/* RESET */
*{
box-sizing:border-box;
margin:0;
padding:0;
}

html, body{
height:100%;
}

body{
font-family:Inter,sans-serif;
background:#f4f7fb;
overflow-x:hidden;
-webkit-overflow-scrolling:touch;
}

/* HEADER (твой стиль) */

.header{
height:82px;
background:rgba(255,255,255,.88);
backdrop-filter:blur(14px);
border-bottom:1px solid #e5e7eb;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
}

.left{
display:flex;
align-items:center;
gap:16px;
}

.logo{
display:flex;
align-items:center;
gap:12px;
text-decoration:none;
color:#111827;
}

.logo img{
width:44px;
height:44px;
border-radius:10px;
}

.logo-title{
font-size:28px;
font-weight:900;
}

.green{color:#2e7d32;}

.subtitle{
font-size:11px;
letter-spacing:2px;
color:#94a3b8;
}

.back{
border:none;
background:linear-gradient(135deg,#34c759,#1f8f3d);
color:white;
padding:12px 20px;
border-radius:16px;
font-weight:800;
cursor:pointer;
}

/* CONTENT */

.content{
min-height:100%;
padding:20px;
}

/* TOP BAR */

.total{
position:sticky;
top:10px;
z-index:10;

background:linear-gradient(135deg,#1f2937,#111827);
color:white;

padding:24px;
border-radius:28px;

display:flex;
justify-content:space-between;

margin-bottom:25px;

box-shadow:0 15px 35px rgba(0,0,0,.18);
}

.total-title{
font-size:18px;
opacity:.8;
}

.total-value{
font-size:40px;
font-weight:900;
}

/* GROUP TITLE */

.group-title{
font-size:32px;
font-weight:900;
margin:35px 0 18px;
color:#111827;
}

/* GRID FIX IOS */

.products-grid{
display:grid;
grid-template-columns:repeat(5, minmax(0,1fr));
gap:18px;
}

/* CARD */

.card{
background:white;
border-radius:26px;
padding:20px;

box-shadow:0 10px 25px rgba(0,0,0,.06);
border:1px solid #edf1f5;
}

.card h2{
font-size:20px;
margin-bottom:12px;
}

/* STATS */

.stats{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:14px;
color:#64748b;
}

/* PROGRESS */

.progress{
height:18px;
background:#e5e7eb;
border-radius:999px;
overflow:hidden;
}

.progress-bar{
height:100%;
border-radius:999px;
display:flex;
align-items:center;
justify-content:flex-end;
padding-right:8px;
font-size:11px;
font-weight:800;
color:white;
background:linear-gradient(90deg,#22c55e,#15803d);
}

/* MONEY */

.money{
margin-top:18px;
padding:14px;
border-radius:18px;
background:linear-gradient(135deg,#dcfce7,#bbf7d0);
color:#166534;
font-size:24px;
font-weight:900;
text-align:center;
}

/* MOBILE FIX */

@media(max-width:900px){
.products-grid{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:600px){
.products-grid{
grid-template-columns:1fr;
}
.header{
flex-wrap:wrap;
height:auto;
gap:10px;
}
.total{
flex-direction:column;
gap:8px;
}
}

</style>
</head>

<body>

<header class="header">

<div class="left">
<a href="index.html" class="logo">
<img src="favicon.png">
<div>
<div class="logo-title">
<span class="green">A</span>uto-<span class="green">S</span>tyle
</div>
<div class="subtitle">ПАНЕЛЬ МЕНЕДЖЕРА</div>
</div>
</a>
</div>

<button class="back" onclick="history.back()">← Назад</button>

</header>

<div class="content">

<div class="total">
<div>
<div class="total-title">Общая премия (старт 5000 ₽)</div>
<div class="total-value" id="totalBonus">0 ₽</div>
</div>
</div>

<div id="products"></div>

</div>

<script>

const products = JSON.parse(localStorage.getItem('products')) || [];

const groups = [
'Ароматизаторы',
'Автохимия',
'Неликвид',
'Масла'
];

const container = document.getElementById('products');
const totalEl = document.getElementById('totalBonus');

let total = 5000; // ⭐ СТАРТОВАЯ ЗП

function safeNum(v){
return isNaN(Number(v)) ? 0 : Number(v);
}

groups.forEach(group => {

const groupProducts = products.filter(p => p.group === group);

if(groupProducts.length === 0) return;

const title = document.createElement('div');
title.className = 'group-title';
title.textContent = group;
container.appendChild(title);

const grid = document.createElement('div');
grid.className = 'products-grid';
container.appendChild(grid);

groupProducts.forEach(product => {

const plan = safeNum(product.plan);
const sold = safeNum(product.sold);
const bonusPer = safeNum(product.bonus);

const percent = plan ? Math.min((sold / plan) * 100, 100) : 0;

const bonus = sold * bonusPer;

total += bonus;

const card = document.createElement('div');
card.className = 'card';

card.innerHTML = `
<h2>${product.name || 'Без названия'}</h2>

<div class="stats">
<span>Продано: <b>${sold}</b></span>
<span>План: <b>${plan}</b></span>
</div>

<div class="progress">
<div class="progress-bar" style="width:${percent}%">
${Math.round(percent)}%
</div>
</div>

<div class="money">
${bonus} ₽
</div>
`;

grid.appendChild(card);

});

});

totalEl.textContent = total + ' ₽';

</script>

</body>
</html>
