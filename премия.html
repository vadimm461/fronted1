<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Премия — AUTO-STYLE</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Inter,sans-serif;
background:#f4f7fb;
overflow-x:hidden;
overflow-y:auto;
}

/* HEADER */

.header{
height:82px;
background:rgba(255,255,255,.88);
backdrop-filter:blur(14px);
border-bottom:1px solid #e5e7eb;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
}

.left{
display:flex;
align-items:center;
gap:16px;
}

.logo{
display:flex;
align-items:center;
gap:12px;
text-decoration:none;
color:#111827;
}

.logo img{
width:44px;
height:44px;
border-radius:10px;
}

.logo-title{
font-size:28px;
font-weight:900;
}

.green{
color:#2e7d32;
}

.subtitle{
font-size:11px;
letter-spacing:2px;
color:#94a3b8;
}

.back{
border:none;
background:linear-gradient(135deg,#34c759,#1f8f3d);
color:white;
padding:12px 20px;
border-radius:16px;
cursor:pointer;
font-weight:800;
transition:.2s;
}

.back:hover{
transform:translateY(-1px);
}

/* CONTENT */

.content{
min-height:calc(100vh - 82px);
padding:20px;
}

/* TOP BONUS */

.total{
position:sticky;
top:10px;
z-index:100;

background:
linear-gradient(
135deg,
#1f2937,
#111827
);

color:white;

padding:24px;

border-radius:28px;

display:flex;
align-items:center;
justify-content:space-between;

margin-bottom:25px;

box-shadow:
0 15px 35px rgba(0,0,0,.18);
}

.total-title{
font-size:18px;
opacity:.8;
margin-bottom:6px;
}

.total-value{
font-size:42px;
font-weight:900;
line-height:1;
}

/* GROUP TITLE */

.group-title{
font-size:34px;
font-weight:900;
color:#111827;
margin:35px 0 20px;
}

/* GRID */

.products-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:18px;
}

/* CARD */

.card{
background:white;
border-radius:28px;
padding:22px;

box-shadow:
0 12px 28px rgba(0,0,0,.06);

border:1px solid #edf1f5;

transition:.2s;
}

.card:hover{
transform:translateY(-3px);
}

.card h2{
font-size:22px;
margin-bottom:14px;
color:#111827;
}

/* STATS */

.stats{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:16px;
color:#64748b;
}

/* BAR */

.progress{
height:22px;
background:#e5e7eb;
border-radius:999px;
overflow:hidden;
position:relative;
}

.progress-bar{
height:100%;
border-radius:999px;

display:flex;
align-items:center;
justify-content:flex-end;

padding-right:10px;

font-size:11px;
font-weight:800;
color:white;

transition:.4s;
}

/* BONUS BLOCK */

.money-box{
margin-top:22px;

padding:20px;

border-radius:24px;

background:
linear-gradient(
135deg,
#ffffff,
#f8fafc
);

border:2px solid #dcfce7;

box-shadow:
0 10px 25px rgba(34,197,94,.08);
}

.money-label{
font-size:14px;
font-weight:700;
color:#64748b;
margin-bottom:10px;
}

.money{
font-size:36px;
font-weight:900;
color:#15803d;
line-height:1;
}

/* MOBILE */

@media(max-width:1600px){

.products-grid{
grid-template-columns:repeat(4,1fr);
}

}

@media(max-width:1200px){

.products-grid{
grid-template-columns:repeat(3,1fr);
}

}

@media(max-width:900px){

.products-grid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:600px){

.products-grid{
grid-template-columns:1fr;
}

.header{
padding:12px;
height:auto;
flex-wrap:wrap;
gap:12px;
}

.logo-title{
font-size:22px;
}

.total{
flex-direction:column;
align-items:flex-start;
gap:8px;
}

.total-value{
font-size:32px;
}

.group-title{
font-size:28px;
}

}

</style>
</head>

<body>

<header class="header">

<div class="left">

<a href="index.html" class="logo">

<img src="favicon.png">

<div>

<div class="logo-title">
<span class="green">A</span>uto-
<span class="green">S</span>tyle
</div>

<div class="subtitle">
ПАНЕЛЬ МЕНЕДЖЕРА
</div>

</div>

</a>

</div>

<button class="back" onclick="history.back()">
← Назад
</button>

</header>

<div class="content">

<div class="total">

<div>

<div class="total-title">
Общая зарплата
</div>

<div class="total-value" id="totalBonus">
0 ₽
</div>

</div>

</div>

<div id="products"></div>

</div>

<script>

const products =
JSON.parse(localStorage.getItem('products')) || [];

/* ГРУППЫ */

const groups = [
'Ароматизаторы',
'Автохимия',
'Неликвид',
'Масла'
];

const container =
document.getElementById('products');

const totalBonus =
document.getElementById('totalBonus');

/* СТАРТОВАЯ ЗП */

const startSalary = 5000;

let total = startSalary;

/* ОТРИСОВКА */

groups.forEach(group => {

const groupProducts =
products.filter(
product => product.group === group
);

if(groupProducts.length === 0){
return;
}

/* TITLE */

container.innerHTML += `

<div class="group-title">
${group}
</div>

<div class="products-grid" id="${group}">
</div>

`;

const groupContainer =
document.getElementById(group);

groupProducts.forEach(product => {

const percent =
Math.min(
(product.sold / product.plan) * 100,
100
);

const bonus =
product.sold * product.bonus;

total += bonus;

/* ЦВЕТ БАРА */

let progressColor = `
linear-gradient(
90deg,
#ef4444,
#dc2626
)
`;

if(percent >= 40){

progressColor = `
linear-gradient(
90deg,
#f59e0b,
#d97706
)
`;

}

if(percent >= 70){

progressColor = `
linear-gradient(
90deg,
#22c55e,
#15803d
)
`;

}

/* CARD */

groupContainer.innerHTML += `

<div class="card">

<h2>
${product.name}
</h2>

<div class="stats">

<span>
Продано:
<b>${product.sold}</b>
</span>

<span>
План:
<b>${product.plan}</b>
</span>

</div>

<div
style="
display:flex;
justify-content:space-between;
margin-bottom:8px;
font-size:13px;
font-weight:700;
color:#64748b;
">

<span>
Старт: 5000 ₽
</span>

<span>
+ ${bonus} ₽
</span>

</div>

<div class="progress">

<div
class="progress-bar"

style="
width:${percent}%;
background:${progressColor};
">

${Math.round(percent)}%

</div>

</div>

<div class="money-box">

<div class="money-label">
Премия за товар
</div>

<div class="money">
${bonus} ₽
</div>

</div>

</div>

`;

});

});

/* ОБЩАЯ ЗП */

totalBonus.innerText =
`${total} ₽`;

</script>

</body>
</html>
