<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Премия — AUTO-STYLE</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Inter,sans-serif;
background:#f4f7fb;
overflow-x:hidden;
color:#111827;
}

/* HEADER */

.header{
height:82px;
background:rgba(255,255,255,.88);
backdrop-filter:blur(14px);
border-bottom:1px solid #e5e7eb;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
position:sticky;
top:0;
z-index:999;
}

.left{
display:flex;
align-items:center;
gap:16px;
}

.logo{
display:flex;
align-items:center;
gap:12px;
text-decoration:none;
color:#111827;
}

.logo img{
width:44px;
height:44px;
border-radius:10px;
}

.logo-title{
font-size:28px;
font-weight:900;
}

.green{
color:#22c55e;
}

.subtitle{
font-size:11px;
letter-spacing:2px;
color:#94a3b8;
}

.back{
border:none;
background:linear-gradient(135deg,#34c759,#15803d);
color:white;
padding:12px 20px;
border-radius:16px;
cursor:pointer;
font-weight:800;
}

/* CONTENT */

.content{
padding:18px;
}

/* TOTAL */

.total{
background:
linear-gradient(
135deg,
#111827,
#0f172a,
#020617
);

border-radius:32px;
padding:28px;
margin-bottom:28px;

box-shadow:
0 20px 40px rgba(0,0,0,.15);

color:white;
}

.total-title{
font-size:18px;
opacity:.7;
margin-bottom:6px;
}

.total-value{
font-size:52px;
font-weight:900;
line-height:1;
}

.total-sub{
margin-top:14px;
font-size:15px;
opacity:.65;
}

/* GROUP */

.group-title{
font-size:38px;
font-weight:900;
margin:36px 0 20px;
color:#111827;
}

/* GRID */

.products-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:18px;
margin-bottom:20px;
}

/* CARD */

.card{
background:
linear-gradient(
180deg,
#ffffff,
#f8fafc
);

border-radius:28px;
padding:22px;

box-shadow:
0 10px 25px rgba(15,23,42,.06);

border:1px solid #eef2f7;

transition:.25s;
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-4px);
}

.card::before{
content:'';
position:absolute;
top:-40px;
right:-40px;
width:120px;
height:120px;
background:rgba(34,197,94,.06);
border-radius:50%;
}

.card h2{
font-size:18px;
line-height:1.2;
margin-bottom:16px;
position:relative;
z-index:2;
}

/* STATS */

.stats{
display:flex;
justify-content:space-between;
font-size:13px;
color:#64748b;
margin-bottom:14px;
}

.stats b{
color:#111827;
}

/* BONUS TOP */

.bonus-top{
margin-bottom:14px;
font-size:15px;
font-weight:800;
color:#16a34a;
}

/* PROGRESS */

.progress{
height:16px;
background:#e5e7eb;
border-radius:999px;
overflow:hidden;
margin-bottom:18px;
position:relative;
}

.progress-bar{
height:100%;
border-radius:999px;
display:flex;
align-items:center;
justify-content:flex-end;
padding-right:8px;

font-size:10px;
font-weight:900;
color:white;

transition:.4s;
}

/* MONEY */

.money{
padding:18px;
border-radius:22px;

background:
linear-gradient(
135deg,
#f0fdf4,
#dcfce7
);

border:1px solid #d1fae5;
}

.money-label{
font-size:13px;
color:#64748b;
margin-bottom:6px;
font-weight:700;
}

.money-value{
font-size:34px;
font-weight:900;
color:#15803d;
line-height:1;
}

/* MOBILE */

@media(max-width:1600px){

.products-grid{
grid-template-columns:repeat(4,1fr);
}

}

@media(max-width:1200px){

.products-grid{
grid-template-columns:repeat(3,1fr);
}

}

@media(max-width:900px){

.products-grid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:600px){

.header{
padding:12px;
height:auto;
flex-wrap:wrap;
gap:12px;
}

.logo-title{
font-size:22px;
}

.content{
padding:12px;
}

.group-title{
font-size:28px;
margin-top:24px;
}

.products-grid{
grid-template-columns:1fr;
gap:14px;
}

.total{
padding:22px;
border-radius:24px;
}

.total-value{
font-size:38px;
}

.card{
padding:18px;
border-radius:24px;
}

.money-value{
font-size:28px;
}

}

</style>
</head>

<body>

<header class="header">

<div class="left">

<a href="index.html" class="logo">

<img src="favicon.png">

<div>

<div class="logo-title">
<span class="green">A</span>uto-
<span class="green">S</span>tyle
</div>

<div class="subtitle">
ПАНЕЛЬ МЕНЕДЖЕРА
</div>

</div>

</a>

</div>

<button class="back" onclick="history.back()">
← Назад
</button>

</header>

<div class="content">

<div class="total">

<div class="total-title">
Общая зарплата
</div>

<div class="total-value" id="totalBonus">
5000 ₽
</div>

<div class="total-sub">
Стартовая ставка + премии за продажи
</div>

</div>

<div id="products"></div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
onSnapshot

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBZ-AW6XoMR14KmBtlz2q06Z0jPGXnWMTw",

authDomain: "auto-style-4dbb7.firebaseapp.com",

projectId: "auto-style-4dbb7",

storageBucket: "auto-style-4dbb7.firebasestorage.app",

messagingSenderId: "217023127803",

appId: "1:217023127803:web:78568cf161edd452b0905e"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const container =
document.getElementById('products');

const totalEl =
document.getElementById('totalBonus');

const groups = [

'Ароматизаторы',
'Автохимия',
'Неликвид',
'Масла'

];

function safe(v){

return isNaN(Number(v))
? 0
: Number(v);

}

function renderProducts(products){

container.innerHTML = '';

let total = 5000;
let maxTotal = 5000;

groups.forEach(group=>{

const groupProducts =
products.filter(
p => p.group === group
);

if(groupProducts.length === 0){
return;
}

const title =
document.createElement('div');

title.className =
'group-title';

title.innerText =
group;

container.appendChild(title);

const grid =
document.createElement('div');

grid.className =
'products-grid';

container.appendChild(grid);

groupProducts.forEach(product=>{

const sold =
safe(product.sold);

const plan =
safe(product.plan);

const bonusPer =
safe(product.bonus);

const bonus =
sold * bonusPer;

const maxBonus =
plan * bonusPer;

const percent =
plan > 0
? Math.min((sold/plan)*100,100)
: 0;

total += bonus;
maxTotal += maxBonus;

let color = `
linear-gradient(
90deg,
#ef4444,
#dc2626
)
`;

if(percent >= 40){

color = `
linear-gradient(
90deg,
#f59e0b,
#d97706
)
`;

}

if(percent >= 70){

color = `
linear-gradient(
90deg,
#22c55e,
#15803d
)
`;

}

const card =
document.createElement('div');

card.className =
'card';

card.innerHTML = `

<h2>
${product.name}
</h2>

<div class="stats">

<span>
Продано:
<b>${sold}</b>
</span>

<span>
План:
<b>${plan}</b>
</span>

</div>

<div class="bonus-top">
+ ${bonus} ₽
</div>

<div class="progress">

<div
class="progress-bar"

style="
width:${percent}%;
background:${color};
">

${bonus}/${maxBonus}

</div>

</div>

<div class="money">

<div class="money-label">
Премия за товар
</div>

<div class="money-value">
${bonus} ₽
</div>

</div>

`;

grid.appendChild(card);

});

});

totalEl.innerText =
`${total} / ${maxTotal} ₽`;

}

onSnapshot(

collection(db,"products"),

(snapshot)=>{

const products = [];

snapshot.forEach((doc)=>{

products.push(doc.data());

});

renderProducts(products);

}

);

</script>

</body>
</html>
