<script>

let products =
JSON.parse(localStorage.getItem('products')) || [];

let editIndex = null;

/* SAVE */

function saveProducts(){

localStorage.setItem(
'products',
JSON.stringify(products)
);

renderProducts();

}

/* ADD / EDIT */

function saveProduct(){

const cashier =
document.getElementById('cashier').value.trim();

const name =
document.getElementById('name').value.trim();

const plan =
document.getElementById('plan').value;

const sold =
document.getElementById('sold').value;

const bonus =
document.getElementById('bonus').value;

/* VALIDATION */

if(cashier === ''){
alert('Введите имя кассира');
return;
}

if(name === ''){
alert('Введите название товара');
return;
}

/*
ТЕПЕРЬ 0 РАЗРЕШЕН
*/

if(plan === ''){
alert('Введите план продаж');
return;
}

if(sold === ''){
alert('Введите количество продаж');
return;
}

if(bonus === ''){
alert('Введите бонус');
return;
}

const product = {

cashier,
name,

plan:Number(plan),
sold:Number(sold),
bonus:Number(bonus)

};

if(editIndex === null){

products.push(product);

}else{

products[editIndex] = product;
editIndex = null;

}

saveProducts();

clearForm();

}

/* DELETE */

function deleteProduct(index){

if(confirm('Удалить товар?')){

products.splice(index,1);

saveProducts();

}

}

/* EDIT */

function editProduct(index){

const product = products[index];

document.getElementById('cashier').value =
product.cashier;

document.getElementById('name').value =
product.name;

document.getElementById('plan').value =
product.plan;

document.getElementById('sold').value =
product.sold;

document.getElementById('bonus').value =
product.bonus;

editIndex = index;

window.scrollTo({
top:0,
behavior:'smooth'
});

}

/* CLEAR */

function clearForm(){

document.getElementById('cashier').value = '';
document.getElementById('name').value = '';
document.getElementById('plan').value = '';
document.getElementById('sold').value = '';
document.getElementById('bonus').value = '';

}

/* RENDER */

function renderProducts(){

const list =
document.getElementById('list');

list.innerHTML = '';

products.forEach((product,index)=>{

const totalBonus =
product.sold *
product.bonus;

list.innerHTML += `

<div class="card">

<div class="cashier">
Кассир: ${product.cashier}
</div>

<h2>${product.name}</h2>

<div class="info">

<div>
План продаж:
<b>${product.plan}</b>
</div>

<div>
Продано:
<b>${product.sold}</b>
</div>

<div>
Бонус за 1 продажу:
<b>${product.bonus} ₽</b>
</div>

</div>

<div class="money">
${totalBonus} ₽
</div>

<div class="actions">

<button
class="edit"
onclick="editProduct(${index})">

Редактировать

</button>

<button
class="delete"
onclick="deleteProduct(${index})">

Удалить

</button>

</div>

</div>

`;

});

}

renderProducts();

</script>
