<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>AUTO-STYLE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  overflow-x: hidden;
  font-family: 'Inter', sans-serif;
  background: #f3f6fb;
  color: #111827;
}

/* LOGIN */
.login-screen {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg,#0f172a,#111827,#1b5e20);
  padding: 20px;
  z-index: 9999;
}

.login-box {
  width: 100%;
  max-width: 420px;
  background: white;
  padding: 30px;
  border-radius: 24px;
}

.login-title {
  font-size: 32px;
  font-weight: 800;
  text-align: center;
  margin-bottom: 20px;
}

.login-title span { color: #2e7d32; }

input, select {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 14px;
  border: 1px solid #e5e7eb;
  background: #f8fafc;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg,#2e7d32,#1b5e20);
  color: white;
  font-weight: 700;
  cursor: pointer;
  font-size: 16px;
}

.error {
  margin-top: 10px;
  color: red;
  font-size: 14px;
  text-align: center;
}

/* APP */
.app { display: none; }

.header {
  position: sticky;
  top: 0;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  padding: 16px;
  border-bottom: 1px solid #eee;
}

.header-inner {
  max-width: 1200px;
  margin: auto;
  display: flex;
  justify-content: space-between;
}

.logo {
  font-size: 24px;
  font-weight: 800;
}

.green { color: #2e7d32; }

.user-box {
  background: #f3f4f6;
  padding: 10px 14px;
  border-radius: 12px;
}

/* LAYOUT */
.main {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.section-title {
  font-size: 22px;
  font-weight: 800;
  margin: 20px 0;
}

/* BANNER */
.news-banner {
  background: linear-gradient(135deg,#1b5e20,#2e7d32);
  color: white;
  padding: 18px;
  border-radius: 18px;
  margin-bottom: 20px;
}

/* CALCULATORS */
.calculators {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
  gap: 16px;
}

.calculator {
  background: white;
  padding: 16px;
  border-radius: 18px;
}

.calc-title {
  font-weight: 800;
}

.calc-subtitle {
  color: #dc2626;
  font-size: 13px;
  margin-bottom: 10px;
}

table {
  width: 100%;
  margin-top: 10px;
  border-collapse: collapse;
}

td {
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}

/* MENU */
.menu-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
  gap: 12px;
}

.menu-card {
  background: white;
  padding: 16px;
  border-radius: 18px;
  text-decoration: none;
  color: inherit;
}

.menu-icon {
  width: 50px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg,#2e7d32,#1b5e20);
  color: white;
  border-radius: 14px;
  margin-bottom: 10px;
}

/* MOBILE FIX */
@media (max-width: 768px) {
  .header-inner {
    flex-direction: column;
    gap: 10px;
    align-items: flex-start;
  }
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">

  <div class="login-box">

    <div class="login-title">
      <span>A</span>uto-<span>S</span>tyle
    </div>

    <select id="userSelect">
      <option value="cashier">Кассир</option>
      <option value="evgeniy">Евгений</option>
      <option value="vadim">Вадим</option>
    </select>

    <input type="password" id="passwordInput" placeholder="Введите пароль">

    <button id="loginBtn">ВОЙТИ</button>

    <div class="error" id="errorMsg"></div>

  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <div class="header">
    <div class="header-inner">
      <div class="logo"><span class="green">A</span>uto-<span class="green">S</span>tyle</div>
      <div class="user-box" id="currentUser">👤 Пользователь</div>
    </div>
  </div>

  <div class="main">

    <div class="news-banner">
      🚀 Бонусный проект запущен — накопительная система скидок
    </div>

    <div class="section-title">Калькуляторы</div>

    <div class="calculators">

      <div class="calculator">
        <div class="calc-title">Агропромбанк</div>
        <div class="calc-subtitle">Рассрочка</div>

        <input type="number" placeholder="Сумма">

        <table>
          <tr><td>3 мес</td><td>0.955</td></tr>
          <tr><td>6 мес</td><td>0.93</td></tr>
          <tr><td>12 мес</td><td>0.875</td></tr>
        </table>
      </div>

    </div>

    <div class="section-title">Меню</div>

    <div class="menu-grid">
      <a class="menu-card" href="#">💳 Безнал</a>
      <a class="menu-card" href="#">📊 Смена</a>
      <a class="menu-card" href="#">🎫 Скидки</a>
      <a class="menu-card" href="#">📚 База</a>
    </div>

  </div>
</div>

<script>

const loginScreen = document.getElementById("loginScreen");
const app = document.getElementById("app");
const loginBtn = document.getElementById("loginBtn");
const passwordInput = document.getElementById("passwordInput");
const userSelect = document.getElementById("userSelect");
const errorMsg = document.getElementById("errorMsg");
const currentUser = document.getElementById("currentUser");

const PASSWORD = "1234";

function login() {
  const pass = passwordInput.value;

  if (pass === PASSWORD) {
    loginScreen.style.display = "none";
    app.style.display = "block";
    currentUser.textContent = "👤 " + userSelect.value;
  } else {
    errorMsg.textContent = "Неверный пароль";
  }
}

loginBtn.addEventListener("click", login);

passwordInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") login();
});

</script>

</body>
</html>
