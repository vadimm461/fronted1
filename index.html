<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Главная страница панели менеджера — Магазин Auto-Style</title>

<style>
*, *::before, *::after{box-sizing:border-box;}
:root{
--green:#2e7d32;
--green-dark:#1b5e20;
--blue:#1976d2;
--bg:#f4f6f9;
--text:#222;
--card:#fff;
--overlay:rgba(0,0,0,.35);
--transition:.3s ease;
}
body{
margin:0;
font-family:Arial,sans-serif;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
transition:background var(--transition), color var(--transition);
}

/* ===== LOGIN ===== */
.login-screen{
position:fixed;inset:0;
display:flex;justify-content:center;align-items:center;
background:linear-gradient(135deg,var(--green-dark),#000);
z-index:9999;padding:15px;
opacity:1;
transition:opacity var(--transition);
}
.login-box{
background:var(--card);
padding:30px 25px;
border-radius:20px;
width:100%;max-width:400px;
text-align:center;
box-shadow:0 30px 70px rgba(0,0,0,.4);
opacity:0;
transform:translateY(20px);
transition:opacity var(--transition), transform var(--transition);
}
.login-box.show{opacity:1; transform:translateY(0);}
.login-title{font-size:26px;font-weight:bold;margin-bottom:20px;}
select,input{
width:100%;padding:12px;margin-bottom:15px;
border-radius:12px;border:1px solid #ccc;font-size:16px;
transition:border-color var(--transition);
}
select:focus,input:focus{border-color:var(--green);}
.login-btn{
width:100%;padding:14px;border:none;border-radius:14px;
background:linear-gradient(135deg,var(--green),var(--green-dark));
color:white;font-size:16px;font-weight:bold;cursor:pointer;
transition:transform var(--transition);
}
.login-btn:hover{transform:scale(1.03);}

/* ===== HEADER (modern) ===== */
.header{
  background: linear-gradient(135deg, #2e7d32, #1b5e20);
  padding: 25px 20px;
  box-shadow: 0 4px 25px rgba(0,0,0,0.15);
  color: white;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
  transition: all 0.3s ease;
}
.header h1{
  margin: 0;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
}
.header p{
  margin: 6px 0 0 0;
  font-size: 16px;
  font-weight: 400;
  opacity: 0.85;
  letter-spacing: 0.3px;
  animation: fadeIn 1s ease forwards;
}

/* Лёгкая анимация для подзаголовка */
@keyframes fadeIn{
  0%{opacity:0; transform: translateY(10px);}
  100%{opacity:0.85; transform: translateY(0);}
}

/* ===== MENU BUTTON ===== */
.menu-toggle{
position:fixed;top:15px;left:15px;
width:48px;height:48px;
background:linear-gradient(135deg,var(--green),var(--green-dark));
color:white;display:flex;align-items:center;justify-content:center;
border-radius:14px;cursor:pointer;
z-index:3000;
box-shadow:0 6px 15px rgba(0,0,0,.2);
display:none;
transition:transform var(--transition);
}
.menu-toggle:hover{transform:scale(1.1);}

/* ===== SIDE MENU ===== */
.side-menu{
position:fixed;top:0;left:0;
width:260px;height:100%;
padding:100px 20px 20px 20px;
background:rgba(31,31,31,.95);
border-right:1px solid #2a2a2a;
transform:translateX(-100%);
transition:transform .35s cubic-bezier(.77,0,.18,1);
z-index:2999;
display:none;
}
.side-menu.active{transform:translateX(0);}
.side-menu button{
width:100%;padding:12px;margin-bottom:12px;
border:none;border-radius:12px;
background:#2a2a2a;color:white;font-weight:500;
cursor:pointer;transition:all var(--transition);
}
.side-menu button:hover{background:var(--green); transform:scale(1.03);}

/* ===== OVERLAY ===== */
.overlay{
position:fixed;inset:0;
background:var(--overlay);
opacity:0;pointer-events:none;
transition:opacity var(--transition);
z-index:2000;
display:none;
}
.overlay.active{opacity:1;pointer-events:auto;}

/* ===== CALCULATORS ===== */
.wrapper{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;padding:20px;
max-width:1400px;margin:auto;
display:none;
transition:opacity var(--transition);
}
.calculator{
background:var(--card);padding:20px;border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,.06);
transition:transform var(--transition), box-shadow var(--transition);
}
.calculator:hover{transform:translateY(-5px); box-shadow:0 12px 25px rgba(0,0,0,.1);}
.title{font-size:18px;font-weight:bold;margin-bottom:5px;}
.subtitle{color:#d32f2f;font-weight:bold;margin-bottom:15px;}
.calculator input{width:100%;}
.btn{
width:100%;padding:12px;margin-bottom:15px;
border:none;border-radius:14px;
background:linear-gradient(135deg,var(--blue),#0d47a1);
color:white;font-weight:bold;cursor:pointer;
transition:transform var(--transition);
}
.btn:hover{transform:scale(1.03);}
table{width:100%;border-collapse:collapse;font-size:14px;}
td{padding:8px 0;border-bottom:1px solid #eee;}
.result{font-weight:bold;}

/* ===== MOBILE ===== */
@media(max-width:768px){
.wrapper{grid-template-columns:1fr;padding:15px;}
.side-menu{
background:rgba(20,20,20,.75);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);
border-right:1px solid rgba(255,255,255,.1);
}
.overlay{background:rgba(0,0,0,.4);backdrop-filter:blur(3px);}
}
</style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
<div class="login-box">
<div class="login-title">Auto-Style</div>
<select id="userSelect">
<option value="cashier">Кассир</option>
<option value="evgeniy">Евгений</option>
<option value="vadim">Вадим</option>
</select>
<input type="password" id="passwordInput" placeholder="Введите пароль">
<button id="loginBtn" class="login-btn">ВОЙТИ</button>
<div id="errorMsg" style="color:red;"></div>
</div>
</div>

<!-- HEADER -->
<div class="header">
<h1>Главная страница панели менеджера</h1>
<p>Магазин <span style="font-weight:bold;">Auto-Style</span></p>
</div>

<!-- MENU -->
<div class="menu-toggle" id="menuToggle" onclick="openMenu()">☰</div>
<div id="sideMenu" class="side-menu">
<div id="currentUser" style="color:white;margin-bottom:20px;font-weight:bold;"></div>

<button onclick="location.href='smena.html'">ЗАКРЫТИЕ СМЕНЫ</button>
<button onclick="location.href='discount.html'">СКИДОЧНАЯ КАРТА</button>
<button onclick="location.href='baza.html'">БАЗА ЗНАНИЙ</button>
<button onclick="location.href='pass.html'">ПАРОЛ
