<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Закрытие смен — AUTO-STYLE</title>

<link rel="icon" href="favicon.png">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Inter,sans-serif;
background:#f4f7fb;
overflow:hidden;
}

.header{

height:82px;

background:
rgba(255,255,255,.88);

backdrop-filter:blur(14px);

border-bottom:
1px solid #e5e7eb;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 20px;

}

.left{

display:flex;

align-items:center;

gap:16px;

}

.logo{

display:flex;

align-items:center;

gap:12px;

text-decoration:none;

color:#111827;

}

.logo img{

width:44px;

height:44px;

border-radius:10px;

}

.logo-title{

font-size:28px;

font-weight:900;

}

.green{

color:#2e7d32;

}

.subtitle{

font-size:11px;

letter-spacing:2px;

color:#94a3b8;

}

.back{

border:none;

background:
linear-gradient(
135deg,
#34c759,
#1f8f3d
);

color:white;

padding:12px 20px;

border-radius:16px;

cursor:pointer;

font-weight:800;

}

.back:hover{

opacity:.95;

}

.content{

height:
calc(100vh - 82px);

padding:14px;

}

.sheet{

width:100%;

height:100%;

border:none;

border-radius:22px;

background:white;

box-shadow:
0 12px 40px rgba(0,0,0,.08);

}

@media(max-width:768px){

.header{

padding:12px;

height:auto;

flex-wrap:wrap;

gap:12px;

}

.content{

height:
calc(100vh - 110px);

padding:10px;

}

.logo-title{

font-size:24px;

}

}

</style>

</head>

<body>

<header class="header">

<div class="left">

<a href="index.html" class="logo">

<img src="favicon.png">

<div>

<div class="logo-title">
<span class="green">A</span>uto-
<span class="green">S</span>tyle
</div>

<div class="subtitle">
ПАНЕЛЬ МЕНЕДЖЕРА
</div>

</div>

</a>

</div>

<button
class="back"
onclick="history.back()">

← Назад

</button>

</header>

<div class="content">

<iframe
class="sheet"

src="https://docs.google.com/forms/d/e/1FAIpQLScWIZFaR3dtwy6crYqgfQjcW0oyPT44qysIhbubXhftkjzK1A/viewform?embedded=true">

</iframe>

</div>

</body>
</html>
